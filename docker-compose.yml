# ⚠️  LOCAL DEVELOPMENT ONLY — do NOT use in production.
# Production database is managed by Railway's Postgres plugin.
# These credentials are intentionally weak for local dev convenience.
services:
  postgres:
    image: postgres:16-alpine
    container_name: careerportal-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432" # bind to localhost only — never expose to 0.0.0.0
    environment:
      POSTGRES_USER: careerportal
      POSTGRES_PASSWORD: careerportal
      POSTGRES_DB: careerportal
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
