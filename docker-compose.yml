services:
  postgres:
    image: postgres:16-alpine
    container_name: careerportal-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: careerportal
      POSTGRES_PASSWORD: careerportal
      POSTGRES_DB: careerportal
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
