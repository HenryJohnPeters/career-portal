[phases.setup]
nixPkgs = ['nodejs_20', 'pnpm']

[phases.install]
cmds = [
  'pnpm install --frozen-lockfile',
  'cd apps/api && pnpm prisma generate'
]

[phases.build]
cmds = [
  'pnpm tsc -p apps/api/tsconfig.json'
]

[start]
cmd = 'cd apps/api && pnpm prisma migrate deploy && node ../../dist/apps/api/main.js'
