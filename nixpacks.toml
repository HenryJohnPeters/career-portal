[phases.setup]
nixPkgs = ['nodejs_20', 'pnpm']

[phases.install]
cmds = ['pnpm install --frozen-lockfile', 'pnpm add express -w']

[phases.build]
cmds = ['VITE_API_URL="${VITE_API_URL:-http://localhost:3000}" VITE_SUPABASE_URL="${VITE_SUPABASE_URL}" VITE_SUPABASE_ANON_KEY="${VITE_SUPABASE_ANON_KEY}" pnpm nx build web --prod']

[start]
cmd = 'node server.js'

[variables]
VITE_API_URL = '{{VITE_API_URL}}'
VITE_SUPABASE_URL = '{{VITE_SUPABASE_URL}}'
VITE_SUPABASE_ANON_KEY = '{{VITE_SUPABASE_ANON_KEY}}'
